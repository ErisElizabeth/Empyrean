<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Empyrean Puppet Workshop</title>
    <link rel="stylesheet" href="./styles.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/",
          "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.19/+esm"
        }
      }
    </script>
  </head>
  <body>
    <!-- Loader Overlay start of this section-->
    <div id="loader-overlay">
      <div class="spinner"></div>
      <p style="color: white; font-family: monospace; margin-top: 15px">
        INITIALIZING RIG...
      </p>
    </div>

    <!-- Puppet Lab UI follows -->
    <div id="puppet-lab-container">
      <video id="puppet-source" preload="auto" playsinline muted></video>
      <canvas id="rig-canvas"></canvas>
    </div>
    <!-- 3D Scene Container end of this section -->
    <main id="scene-container" aria-label="Empyrean Puppet Lab"></main>
    <script type="module" src="./main.js?v=0.1.41-alpha"></script>
  </body>
</html>
